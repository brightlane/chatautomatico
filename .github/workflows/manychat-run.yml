name: ManyChat Daily Empire Refresh
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: python manychat-gen.py
    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "brightlane-bot"
        git add -A
        git diff-index --quiet HEAD || git commit -m "Daily 2026 SEO Refresh"
        git push
